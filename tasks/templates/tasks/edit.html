{% extends 'base.html' %}

{% block content %}
  <div class="card-container col-md-6 mx-auto">
    <h2 class="mb-4">Edit Task</h2>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        {{ form.as_div }}
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-success shadow-sm px-4 py-2" style="background-color: var(--accent-color); border: none;">Save Changes</button>
        <a href="{% url 'tasks:index' %}" class="text-secondary text-decoration-none">Back to list</a>
      </div>
    </form>
  </div>
{% endblock %}
